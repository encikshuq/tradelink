<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TradeLink Control Panel</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(0,191,255,.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(30,144,255,.18), transparent 30%),
        linear-gradient(135deg,#020617,#07111f 45%,#020617);
      color:#e5e7eb;
      overflow-x:hidden;
    }

    .app{
      width:100%;
      max-width:430px;
      min-height:100vh;
      margin:0 auto;
      padding:18px 14px 28px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:16px;
    }

    .brand{
      line-height:1.1;
    }

    .brand h1{
      font-size:22px;
      letter-spacing:.8px;
      color:#38bdf8;
      text-shadow:0 0 18px rgba(56,189,248,.45);
    }

    .brand span{
      display:block;
      margin-top:5px;
      font-size:12px;
      color:#94a3b8;
    }

    .top-actions{
      display:flex;
      gap:7px;
    }

    .icon-btn{
      border:1px solid rgba(56,189,248,.25);
      background:rgba(15,23,42,.82);
      color:#e5e7eb;
      padding:8px 10px;
      border-radius:12px;
      font-size:12px;
      cursor:pointer;
      text-decoration:none;
      box-shadow:0 10px 25px rgba(0,0,0,.25);
    }

    .panel{
      border:1px solid rgba(56,189,248,.20);
      background:rgba(15,23,42,.78);
      backdrop-filter:blur(14px);
      border-radius:22px;
      padding:16px;
      box-shadow:0 22px 55px rgba(0,0,0,.45);
    }

    .page-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:14px;
      padding-bottom:12px;
      border-bottom:1px solid rgba(148,163,184,.15);
    }

    .page-title h2{
      font-size:15px;
      color:#facc15;
      letter-spacing:.5px;
    }

    .status-pill{
      font-size:11px;
      padding:6px 9px;
      border-radius:999px;
      color:#22c55e;
      background:rgba(34,197,94,.10);
      border:1px solid rgba(34,197,94,.25);
    }

    .card{
      background:rgba(2,6,23,.72);
      border:1px solid rgba(51,65,85,.88);
      border-radius:18px;
      padding:14px;
      margin-bottom:12px;
    }

    .card-title{
      color:#38bdf8;
      font-size:12px;
      font-weight:700;
      letter-spacing:.7px;
      margin-bottom:12px;
      text-transform:uppercase;
    }

    label{
      display:block;
      font-size:12px;
      color:#cbd5e1;
      margin-bottom:7px;
    }

    input{
      width:100%;
      height:39px;
      border:none;
      outline:none;
      border-radius:12px;
      padding:0 12px;
      background:#f8fafc;
      color:#020617;
      font-size:14px;
      font-weight:700;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 112px;
      gap:10px;
      align-items:end;
      margin-bottom:10px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    button{
      width:100%;
      border:none;
      border-radius:12px;
      min-height:39px;
      color:white;
      font-size:12px;
      font-weight:800;
      letter-spacing:.4px;
      cursor:pointer;
      box-shadow:0 12px 24px rgba(0,0,0,.25);
      transition:.18s ease;
    }

    button:active{
      transform:scale(.98);
    }

    .btn-blue{background:linear-gradient(135deg,#0284c7,#2563eb)}
    .btn-red{background:linear-gradient(135deg,#dc2626,#7f1d1d)}
    .btn-green{background:linear-gradient(135deg,#16a34a,#166534)}
    .btn-orange{background:linear-gradient(135deg,#f59e0b,#b45309)}
    .btn-purple{background:linear-gradient(135deg,#7c3aed,#4c1d95)}
    .btn-slate{background:linear-gradient(135deg,#475569,#1e293b)}

    .danger{
      min-height:43px;
      margin-bottom:10px;
    }

    .nav-btn{
      display:block;
      width:100%;
      text-align:center;
      text-decoration:none;
      padding:13px 14px;
      border-radius:15px;
      color:white;
      font-size:13px;
      font-weight:800;
      letter-spacing:.5px;
      background:linear-gradient(135deg,#0284c7,#2563eb);
      box-shadow:0 14px 28px rgba(37,99,235,.24);
    }

    .msg{
      display:none;
      margin-top:12px;
      padding:11px 12px;
      border-radius:13px;
      font-size:12px;
      line-height:1.4;
      background:rgba(34,197,94,.10);
      color:#86efac;
      border:1px solid rgba(34,197,94,.22);
    }

    .msg.error{
      background:rgba(239,68,68,.10);
      color:#fecaca;
      border-color:rgba(239,68,68,.22);
    }

    .hint{
      margin-top:8px;
      color:#64748b;
      font-size:11px;
      line-height:1.45;
    }

    @media(max-width:380px){
      .app{padding:14px 10px 24px}
      .panel{padding:13px}
      .row{grid-template-columns:1fr 96px;gap:8px}
      .brand h1{font-size:20px}
      .icon-btn{padding:7px 8px;font-size:11px}
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="topbar">
      <div class="brand">
        <h1>TradeLink</h1>
        <span>Control Panel by Encik Shuq</span>
      </div>

      <div class="top-actions">
        <a class="icon-btn" href="setting.html">Setting</a>
        <button class="icon-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="panel">
      <div class="page-title">
        <h2>TRADE CONTROL PANEL</h2>
        <div class="status-pill" id="clientStatus">ONLINE</div>
      </div>

      <div class="card">
        <div class="card-title">Target Pair</div>
        <label for="symbol">Symbol</label>
        <input id="symbol" value="XAUUSD" placeholder="XAUUSD" />
        <div class="hint">Symbol ini akan dihantar bersama command ke Firebase.</div>
      </div>

      <div class="card">
        <div class="card-title">Risk Setting</div>

        <div class="row">
          <div>
            <label for="sl">Stop Loss</label>
            <input id="sl" type="number" step="0.01" value="0" />
          </div>
          <button class="btn-red" onclick="sendCommand('SET_SL')">SET SL</button>
        </div>

        <div class="row">
          <div>
            <label for="tp">Take Profit</label>
            <input id="tp" type="number" step="0.01" value="0" />
          </div>
          <button class="btn-green" onclick="sendCommand('SET_TP')">SET TP</button>
        </div>

        <button class="btn-orange" onclick="sendCommand('SET_BE')">SET BREAK EVEN</button>
      </div>

      <div class="card">
        <div class="card-title">Close Control</div>
        <button class="btn-red danger" onclick="sendCommand('CLOSE_ALL')">CLOSE ALL POSITION</button>

        <div class="grid-2">
          <button class="btn-red" onclick="sendCommand('CLOSE_LOSS')">CLOSE LOSS</button>
          <button class="btn-green" onclick="sendCommand('CLOSE_PROFIT')">CLOSE PROFIT</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Profit Rank Close</div>

        <div class="row">
          <div>
            <label for="lowUnit">Low Unit</label>
            <input id="lowUnit" type="number" min="1" step="1" value="1" />
          </div>
          <button class="btn-purple" onclick="sendCommand('CLOSE_LOW')">CLOSE LOW</button>
        </div>

        <div class="row">
          <div>
            <label for="highUnit">High Unit</label>
            <input id="highUnit" type="number" min="1" step="1" value="1" />
          </div>
          <button class="btn-green" onclick="sendCommand('CLOSE_HIGH')">CLOSE HIGH</button>
        </div>
      </div>

      <a class="nav-btn" href="dashboard.html">TRADING DASHBOARD</a>

      <div class="msg" id="msgBox"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      databaseURL:"https://tradelink-84f02-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const clientId = localStorage.getItem("clientId") || localStorage.getItem("clientKey");

    if(!clientId){
      window.location.href = "index.html";
    }

    document.getElementById("clientStatus").innerText = clientId;

    window.sendCommand = async function(action){
      const msgBox = document.getElementById("msgBox");

      const payload = {
        action: action,
        symbol: document.getElementById("symbol").value.trim() || "XAUUSD",
        sl: Number(document.getElementById("sl").value || 0),
        tp: Number(document.getElementById("tp").value || 0),
        low_unit: Number(document.getElementById("lowUnit").value || 1),
        high_unit: Number(document.getElementById("highUnit").value || 1),
        status: "PENDING",
        source: "WEB_CONTROL_PANEL",
        created_at: Date.now(),
        server_time: serverTimestamp()
      };

      try{
        await set(ref(db, "TradeLink/clients/" + clientId + "/command"), payload);

        msgBox.className = "msg";
        msgBox.style.display = "block";
        msgBox.innerText = "Command sent: " + action;
      }catch(error){
        msgBox.className = "msg error";
        msgBox.style.display = "block";
        msgBox.innerText = "Command failed: " + error.message;
      }
    }

    window.logout = function(){
      localStorage.removeItem("clientId");
      localStorage.removeItem("clientKey");
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
